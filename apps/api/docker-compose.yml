services:
  postgres:
    image: postgres:16-alpine
    container_name: bazar-api-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bazar}
      POSTGRES_USER: ${POSTGRES_USER:-bazar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bazar}
    volumes:
      - bazar_api_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bazar} -d ${POSTGRES_DB:-bazar}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  bazar_api_postgres_data:
